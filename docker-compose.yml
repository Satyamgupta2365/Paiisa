version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spendpilot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spendpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8080"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://spendpilot:password@db:5432/spendpilot
      PORT: "8080"
      NASIKO_ENABLED: "true"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
    command: sh -c "npm install && npm start"
    depends_on:
      - backend

volumes:
  postgres_data:
